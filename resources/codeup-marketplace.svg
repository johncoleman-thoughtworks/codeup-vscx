    <!-- Left brace: { -->
    <path d="M42 22 C26 22 26 38 26 48 C26 58 20 64 14 64 C20 64 26 70 26 80 C26 90 26 106 42 106"/>
    <!-- Right brace: } -->
    <path d="M86 22 C102 22 102 38 102 48 C102 58 108 64 114 64 C108 64 102 70 102 80 C102 90 102 106 86 106"/>
    <!-- Caret: ^ -->
